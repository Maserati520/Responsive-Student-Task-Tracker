<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Final Assignment</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-900">
    <header class="topbar border-b border-gray-200 bg-white shadow-sm">
      <nav class="mx-auto flex max-w-6xl items-center justify-between p-4">
        <div class="flex items-center gap-2">
          <svg class="h-6 w-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
          <h1 class="text-xl font-bold text-blue-600 tracking-wide">TaskTracker</h1>
        </div>
        <div class="flex gap-2 md:hidden">
          <button id="hamburger" class="rounded border px-3 py-2 text-gray-600 hover:bg-gray-100">
            &#9776;
          </button>
        </div>
        <div id="nav" class="hidden items-center gap-6 md:flex font-medium text-gray-600">
          <a class="hover:text-blue-600 transition" href="#home">Home</a>
          <a class="hover:text-blue-600 transition" href="#task-section">My Tasks</a>
        </div>
      </nav>
    </header>

    <main class="mx-auto max-w-6xl p-4">
      <!-- Hero Section -->
      <section
        id="home"
        class="my-8 flex flex-col items-center justify-center rounded-2xl bg-gradient-to-r from-blue-500 to-indigo-600 p-12 text-center text-white shadow-lg"
      >
        <h2 class="mb-4 text-4xl font-extrabold tracking-tight md:text-5xl">
          Manage Your Tasks Efficiently
        </h2>
        <p class="mb-8 max-w-2xl text-lg opacity-90">
          Stay organized, focused, and achieve your goals with our simple yet
          powerful task management application.
        </p>
        <a
          href="#task-section"
          class="rounded-full bg-white px-8 py-3 font-semibold text-blue-600 shadow transition-transform hover:scale-105 hover:bg-gray-100"
          >Get Started</a
        >
      </section>

      <!-- Task Section -->
      <section id="task-section" class="my-12">
        <div class="grid gap-8 md:grid-cols-3">
          <!-- Task Form -->
          <div
            class="col-span-1 rounded-2xl bg-white p-6 shadow-md border border-gray-100"
          >
            <h3 class="mb-6 text-2xl font-bold text-gray-800">
              Add New Task
            </h3>
            <form id="taskForm" class="flex flex-col gap-4">
              <div>
                <label
                  for="taskName"
                  class="mb-1 block text-sm font-medium text-gray-700"
                  >Task Description</label
                >
                <input
                  type="text"
                  id="taskName"
                  placeholder="What needs to be done?"
                  class="w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200"
                  required
                />
              </div>
              <div>
                <label
                  for="taskDate"
                  class="mb-1 block text-sm font-medium text-gray-700"
                  >Due Date</label
                >
                <input
                  type="date"
                  id="taskDate"
                  class="w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200"
                  required
                />
              </div>
              <button
                type="submit"
                class="mt-2 w-full rounded-lg bg-blue-600 px-4 py-3 font-semibold text-white transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
              >
                Add Task
              </button>
            </form>
            <div id="formError" class="mt-3 hidden text-sm text-red-500">
              Please fill out all fields.
            </div>
          </div>

          <!-- Task Display Area -->
          <div
            class="col-span-1 md:col-span-2 rounded-2xl bg-white p-6 shadow-md border border-gray-100"
          >
            <div class="mb-6 flex items-center justify-between">
              <h3 class="text-2xl font-bold text-gray-800">
                Your Tasks
              </h3>
              <span
                id="taskCount"
                class="rounded-full bg-blue-100 px-3 py-1 text-sm font-semibold text-blue-800"
                >0 Tasks</span
              >
            </div>

            <ul id="taskList" class="flex flex-col gap-3">
              <!-- Tasks will be dynamically injected here -->
              <li
                id="emptyState"
                class="flex flex-col items-center justify-center rounded-xl border-2 border-dashed border-gray-200 p-8 text-center"
              >
                <svg
                  class="mb-3 h-12 w-12 text-gray-400"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"
                  ></path>
                </svg>
                <p class="text-gray-500">
                  No tasks yet. Add one to get started!
                </p>
              </li>
            </ul>
          </div>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById("taskForm");
      const taskNameInput = document.getElementById("taskName");
      const taskDateInput = document.getElementById("taskDate");
      const formError = document.getElementById("formError");
      const taskList = document.getElementById("taskList");
      const taskCountEl = document.getElementById("taskCount");
      const emptyState = document.getElementById("emptyState");

      // 1. Local Storage Setup
      let tasks = JSON.parse(localStorage.getItem("studentTasks")) || [];

      // 2. Render Tasks
      function renderTasks() {
        // Clear all items except emptyState
        Array.from(taskList.children).forEach((child) => {
          if (child.id !== "emptyState") {
            child.remove();
          }
        });

        if (tasks.length === 0) {
          emptyState.classList.remove("hidden");
          emptyState.classList.add("flex");
        } else {
          emptyState.classList.remove("flex");
          emptyState.classList.add("hidden");

          tasks.forEach((task, index) => {
            const li = document.createElement("li");
            li.className =
              "flex items-center justify-between rounded-xl border border-gray-100 bg-gray-50 p-4 shadow-sm transition hover:shadow-md";

            li.innerHTML = `
            <div class="flex flex-col">
              <span class="font-semibold text-gray-800">${task.name}</span>
              <span class="text-sm text-gray-500">Due: ${task.date}</span>
            </div>
            <button onclick="deleteTask(${index})" class="rounded-lg bg-red-100 px-3 py-2 text-sm font-medium text-red-600 transition hover:bg-red-200:bg-red-900/50">
              Delete
            </button>
          `;
            taskList.appendChild(li);
          });
        }

        // Update task count
        taskCountEl.textContent = `${tasks.length} Task${tasks.length !== 1 ? "s" : ""}`;
      }

      // 3. Save to Local Storage
      function saveTasks() {
        localStorage.setItem("studentTasks", JSON.stringify(tasks));
      }

      // 4. Delete Task
      window.deleteTask = function (index) {
        tasks.splice(index, 1);
        saveTasks();
        renderTasks();
      };

      // 5. Handle Form Submission
      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const taskName = taskNameInput.value.trim();
        const taskDate = taskDateInput.value;

        // Validation
        if (!taskName || !taskDate) {
          formError.classList.remove("hidden");
          return;
        }

        formError.classList.add("hidden");

        // Add new task
        tasks.push({
          name: taskName,
          date: taskDate,
        });

        saveTasks();
        renderTasks();

        // Reset input fields
        form.reset();
      });

      // Initial Load
      renderTasks();
    </script>
  </body>
</html>
