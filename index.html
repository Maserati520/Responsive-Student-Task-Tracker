<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Final Assignment</title>
  <script>tailwind.config={darkMode:"class"}</script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <header class="topbar">
    <nav class="mx-auto flex max-w-6xl items-center justify-between p-4">
      <h1 class="text-xl font-bold text-blue-600">Course Hub</h1>
      <div class="flex gap-2 md:hidden">
        <button id="themeMobile" class="rounded bg-blue-600 px-3 py-2 text-white">Dark</button>
        <button id="hamburger" class="rounded border px-3 py-2">&#9776;</button>
      </div>
      <div id="nav" class="hidden items-center gap-2 md:flex">
        <a class="nav active" href="#home">Home</a>
        <a class="nav" href="#inputSec">Student</a>
        <div class="relative">
          <button id="dropBtn" class="nav">Activities &#9662;</button>
          <div id="dropMenu" class="dropdown absolute right-0 mt-2 hidden w-40 rounded p-2 shadow">
            <a class="nav block" href="#cards">Cards</a>
            <a class="nav block" href="#listSec">List</a>
          </div>
        </div>
        <a class="nav" href="#contact">Contact</a>
        <button id="theme" class="rounded bg-blue-600 px-3 py-2 text-white">Dark</button>
      </div>
    </nav>
  </header>
  
  <main class="mx-auto max-w-6xl p-4">
    <!-- Hero Section -->
    <section id="home" class="my-8 flex flex-col items-center justify-center rounded-2xl bg-gradient-to-r from-blue-500 to-indigo-600 p-12 text-center text-white shadow-lg">
      <h2 class="mb-4 text-4xl font-extrabold tracking-tight md:text-5xl">Manage Your Tasks Efficiently</h2>
      <p class="mb-8 max-w-2xl text-lg opacity-90">Stay organized, focused, and achieve your goals with our simple yet powerful task management application.</p>
      <a href="#task-section" class="rounded-full bg-white px-8 py-3 font-semibold text-blue-600 shadow transition-transform hover:scale-105 hover:bg-gray-100">Get Started</a>
    </section>
  </main>
    
</body>
</html>
